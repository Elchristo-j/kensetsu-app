{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container mt-5 mb-5" style="max-width: 800px;">
    
    <div class="text-center py-5">
        <h3 class="fw-bold mb-4">会員の解約について</h3>

        <div class="bg-light p-4 rounded-3 text-start d-inline-block" style="max-width: 600px;">
            <p class="mb-3" style="line-height: 1.8;">
                現在、会員の解約は自動処理システム準備中のため、お手数ですが下記より
                <strong>『解約希望』</strong>と書き、<strong>『解約理由』</strong>を記載していただいて運営事務局までメッセージを送信してください。<br>
                確認次第、順次登録情報を削除させていただきます。
            </p>

            <div class="text-center mt-4">
                <a href="{% url 'contact' %}" class="btn btn-outline-danger rounded-pill px-5 py-2 fw-bold">
                    <i class="bi bi-envelope"></i> メッセージを送信する
                </a>
            </div>
        </div>
    </div>

</div>
{% endblock %}
