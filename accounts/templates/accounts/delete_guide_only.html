{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container mt-5 mb-5" style="max-width: 800px;">
    
    <div class="text-center py-5">
        <h3 class="fw-bold mb-4">会員の解約について</h3>

        <div class="bg-light p-4 rounded-3 text-start d-inline-block" style="max-width: 600px;">
            <p class="mb-3" style="line-height: 1.8;">
                会員の解約は、マイページにて<strong>『アカウント削除（退会）』</strong>ボタンを押し、<strong>『はい、退会します』</strong>ボタンを押せば完了です。
                アカウント情報は完全に削除されますが、押し間違い事故への対応もあり、30日間はデータベースに残る可能性がありますのでご了承ください。<br>
                
            </p>

            <div class="text-center mt-4">
                <a href="{% url 'mypage' %}" class="btn btn-outline-danger rounded-pill px-5 py-2 fw-bold">
                    マイページで退会手続きをする
                </a>
            </div>
        </div>
    </div>

</div>
{% endblock %}
