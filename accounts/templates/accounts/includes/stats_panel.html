{% load humanize %}

<div class="row align-items-center">
    <div class="col-md-6 mb-4 mb-md-0">
        {% if stats.exists %}
            <div class="mb-4">
                <h6 class="text-muted small mb-1">総合スコア（{{ role_name }}）</h6>
                <div class="d-flex align-items-baseline">
                    <h1 class="text-warning fw-bold mb-0 display-4">{{ stats.average }}</h1>
                    <span class="text-muted fs-5 ms-2">/ 10</span>
                </div>
                <small class="text-muted">（評価件数: {{ stats.count }}件）</small>
            </div>

            <div class="daily-wage-box rounded mb-3 p-3 bg-light border-start border-4 border-success">
                <p class="mb-0 text-success fw-bold small">推定日当価値（目安）</p>
                <h2 class="fw-bold text-dark wage-amount mb-0">
                    ¥ {{ stats.utility_amount|intcomma }}
                    <span class="fs-6 text-muted fw-normal">/日</span>
                </h2>
                <small class="text-muted" style="font-size: 0.8rem;">
                    ※高評価を獲得して価値を高めましょう！
                </small>
            </div>
        {% else %}
            <div class="mb-4 py-3">
                <h6 class="text-muted small mb-1">総合スコア（{{ role_name }}）</h6>
                <div class="d-flex align-items-baseline">
                    <h1 class="text-muted fw-bold mb-0 display-4">-.-</h1>
                </div>
                <p class="text-muted small">まだ評価がありません<br>（チャートは空の状態です）</p>
            </div>
        {% endif %}
    </div>

    <div class="col-md-6 text-center">
        <div style="max-width: 320px; margin: 0 auto;">
            <canvas id="{{ chart_id }}"></canvas>
        </div>
        <div class="mt-2 text-muted" style="font-size: 0.75rem;">
            <span>能力・協調性・勤勉性・人間性・有用性</span>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        var ctx = document.getElementById('{{ chart_id }}');
        if (ctx) {
            new Chart(ctx.getContext('2d'), {
                type: 'radar',
                data: {
                    labels: ['能力', '協調性', '勤勉性', '人間性', '有用性'],
                    datasets: [{
                        label: '{{ role_name }}評価',
                        // データがない場合は [0,0,0,0,0] を使う
                        data: {{ stats.chart_data|default:"[0,0,0,0,0]"|safe }},
                        backgroundColor: 'rgba(54, 162, 235, 0.2)',
                        borderColor: 'rgba(54, 162, 235, 1)',
                        borderWidth: 2,
                        pointBackgroundColor: 'rgba(54, 162, 235, 1)'
                    }]
                },
                options: {
                    scales: {
                        r: {
                            min: 0, max: 10,
                            ticks: { stepSize: 2, backdropColor: 'transparent' },
                            pointLabels: { font: { size: 11 } }
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }
    });
</script>
