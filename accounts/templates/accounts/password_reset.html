{% extends 'base.html' %}
{% block content %}
<div class="container mt-5" style="max-width: 500px;">
    <div class="card shadow-sm border-0 rounded-4 p-4">
        <h4 class="fw-bold mb-3">パスワードの再設定</h4>
        <p class="text-muted small mb-4">登録したメールアドレスを入力してください。パスワード再設定用のリンクを送信します。</p>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-bold">メールアドレス</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-dark w-100 rounded-pill fw-bold">送信する</button>
        </form>
    </div>
</div>
{% endblock %}
