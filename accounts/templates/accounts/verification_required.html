{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            
            <div class="card shadow-lg border-0 rounded-4 p-5">
                <div class="mb-4">
                    <i class="bi bi-shield-lock-fill text-warning" style="font-size: 5rem;"></i>
                </div>
                
                <h2 class="fw-bold mb-3">本人確認が必要です</h2>
                
                <p class="lead text-muted mb-4">
                    有料プランへの変更や、全ての機能をご利用いただくには、<br>
                    先に<strong>本人確認書類の提出</strong>をお願いしております。
                </p>
                
                <div class="alert alert-light border rounded-3 text-start d-inline-block mx-auto p-4 mb-4" style="max-width: 500px;">
                    <h6 class="fw-bold"><i class="bi bi-check-circle-fill text-success"></i> 本人確認を行うメリット</h6>
                    <ul class="mb-0 small text-muted ps-3">
                        <li>「Bronze会員」へランクアップ（応募数が増えます）</li>
                        <li>有料プラン（Silver/Gold/Platinum）への加入が可能に</li>
                        <li>信頼性が高まり、採用率アップ</li>
                    </ul>
                </div>

                <div class="d-grid gap-3 d-sm-flex justify-content-center">
                    <a href="{% url 'profile_edit' %}" class="btn btn-primary btn-lg rounded-pill px-5 fw-bold shadow">
                        <i class="bi bi-person-badge"></i> 本人確認書類を提出する
                    </a>
                    <a href="{% url 'mypage' %}" class="btn btn-outline-secondary btn-lg rounded-pill px-5">
                        マイページへ戻る
                    </a>
                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
