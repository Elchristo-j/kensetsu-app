{% extends "base.html" %}
{% block content %}
<div class="container my-5" style="max-width: 500px;">
  <div class="card shadow border-0 overflow-hidden">
    <div class="card-header bg-sumi text-white py-3">
      <h4 class="mb-0">👤 新規会員登録</h4>
    </div>
    <div class="card-body p-4">
      <form method="post">
        {% csrf_token %}
        {% for field in form %}
          <div class="mb-3">
            <label class="form-label fw-bold">{{ field.label }}</label>
            {{ field }}
            {% if field.help_text %}
              <div class="form-text text-muted small">{{ field.help_text }}</div>
            {% endif %}
          </div>
        {% endfor %}
        <button type="submit" class="btn btn-sumi w-100 mt-3 py-2">登録する</button>
      </form>
    </div>
    <div class="card-footer text-center bg-light">
      すでにアカウントをお持ちの方は <a href="{% url 'login' %}" class="text-sumi">ログイン</a>
    </div>
  </div>
</div>
{% endblock %}
