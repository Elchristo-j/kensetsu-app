<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>会員登録 | 建設マッチング</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container mt-5" style="max-width: 500px;">
      <div class="card shadow">
        <div class="card-header bg-sumi text-white">
          <h4>👤 新規会員登録</h4>
        </div>
        <div class="card-body">
          <form method="post">
            {% csrf_token %}
            {% for field in form %}
              <div class="mb-3">
                <label class="form-label fw-bold">{{ field.label }}</label>
                {{ field }}
                {% if field.help_text %}
                  <div class="form-text text-muted small">{{ field.help_text }}</div>
                {% endif %}
              </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary w-100 mt-3">登録する</button>
          </form>
        </div>
        <div class="card-footer text-center">
          すでにアカウントをお持ちの方は <a href="{% url 'login' %}">ログイン</a>
        </div>
      </div>
    </div>
  </body>
</html>
