<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>プロフィール編集 | 建設マッチング</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
      <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">🏗️ 建設マッチング</a>
      </div>
    </nav>

    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
          
          <div class="card shadow">
            <div class="card-header bg-white py-3">
              <h4 class="mb-0 fw-bold">🛠️ プロフィール編集</h4>
            </div>
            <div class="card-body p-4">
              
              <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="mb-4">
                  <label class="form-label fw-bold">{{ form.image.label }}</label>
                  <br>
                  {{ form.image }}
                </div>

                <div class="mb-3">
                  <label class="form-label fw-bold">{{ form.location.label }}</label>
                  {{ form.location }}
                </div>

                <div class="mb-4">
                  <label class="form-label fw-bold">{{ form.description.label }}</label>
                  {{ form.description }}
                </div>

                <div class="d-grid gap-2">
                  <button type="submit" class="btn btn-primary btn-lg fw-bold">
                    保存する
                  </button>
                  <a href="{% url 'home' %}" class="btn btn-outline-secondary">
                    キャンセル
                  </a>
                </div>
              </form>
              </div>
          </div>

        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
