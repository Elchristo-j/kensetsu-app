{% extends 'base.html' %}
{% block content %}
<div class="container mt-5 mb-5" style="max-width: 600px;">
  <div class="card shadow border-0 rounded-4 overflow-hidden">
    <div class="card-header text-white py-3 bg-sumi">
      <h4 class="mb-0 fw-bold">👤 プロフィール編集</h4>
    </div>
    <div class="card-body p-4">
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-4 text-center">
          <label class="form-label d-block fw-bold text-start">プロフィール画像</label>
          {{ form.image }}
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">表示名（会社名や氏名）</label>
          {{ form.company_name }} </div>
        <div class="mb-3">
          <label class="form-label fw-bold">地域（都道府県）</label>
          {{ form.location }} </div>
        <div class="mb-3">
          <label class="form-label fw-bold">自己紹介・経歴・保有資格</label>
          {{ form.description }} </div>
        <div class="mb-4">
            <label class="form-label fw-bold">本人確認書類（免許証など）</label>
            <div class="card bg-light border-0 p-3">
                {{ form.id_card_image }}
                <div class="form-text small mt-2">※ 承認されるとブロンズランクに昇格します。</div>
            </div>
        </div>
        <div class="d-grid gap-2 mt-5">
          <button type="submit" class="btn btn-sumi btn-lg rounded-pill fw-bold shadow">変更を保存する</button>
          <a href="{% url 'profile_detail' user.id %}" class="btn btn-outline-secondary rounded-pill">キャンセル</a>
        </div>
      </form>
    </div>
  </div>
</div>
<style>.bg-sumi { background-color: #15151a !important; }</style>
{% endblock %}
