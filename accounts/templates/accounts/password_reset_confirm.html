{% extends 'base.html' %}
{% block content %}
<div class="container mt-5" style="max-width: 500px;">
    <div class="card shadow-sm border-0 rounded-4 p-4">
        <h4 class="fw-bold mb-3">新しいパスワードの設定</h4>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-bold">新しいパスワード</label>
                <input type="password" name="new_password1" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">新しいパスワード（確認）</label>
                <input type="password" name="new_password2" class="form-control" required>
            </div>
            {% if form.errors %}
                <div class="alert alert-danger small">{{ form.errors }}</div>
            {% endif %}
            <button type="submit" class="btn btn-dark w-100 rounded-pill fw-bold">パスワードを変更する</button>
        </form>
    </div>
</div>
{% endblock %}
