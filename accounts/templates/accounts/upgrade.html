{% extends 'base.html' %}

{% block content %}
<div class="container mt-5 py-5">
    <div class="text-center mb-5">
        <h2 class="text-light fw-bold">プランのアップグレード</h2>
        <p class="text-secondary">あなたのビジネスを次のステージへ。プロ仕様の機能を開放しましょう。</p>
    </div>

    <div class="row g-4 justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card h-100 shadow-sm border-secondary" style="background-color: #15151a; color: #fff;">
                <div class="card-body p-4 d-flex flex-column">
                    <h5 class="card-title text-secondary border-bottom border-secondary pb-2">シルバープラン</h5>
                    <div class="my-4">
                        <span class="display-5 fw-bold">¥5,500</span>
                        <span class="text-secondary">/ 月（税込）</span>
                    </div>
                    <ul class="list-unstyled mb-5 flex-grow-1 text-light">
                        <li class="mb-2"><i class="bi bi-check-circle-fill text-info me-2"></i>応募制限：無制限</li>
                        <li class="mb-2"><i class="bi bi-check-circle-fill text-info me-2"></i>案件の優先表示（シルバー枠）</li>
                        <li class="mb-2"><i class="bi bi-check-circle-fill text-info me-2"></i>プロフィールの信頼度アップ</li>
                    </ul>
                    
                    <a href="{% url 'create_checkout_session' 'silver' %}" class="btn btn-outline-light btn-lg w-100 py-3 fw-bold">
                        シルバーへ昇格する
                    </a>
                </div>
            </div>
        </div>

        </div>
</div>
{% endblock %}
