{% extends 'base.html' %}

{% block content %}
<div class="container mt-5 mb-5">
    <div class="text-center mb-5">
        <h2 class="fw-bold">プランをアップグレード</h2>
        <p class="text-muted">Stripe決済テスト：実際のプランを選択してください。</p>
    </div>

    <div class="row row-cols-1 row-cols-md-3 g-4">
        <div class="col">
            <div class="card h-100 shadow-sm border-0">
                <div class="card-body text-center p-4">
                    <h5 class="fw-bold mb-3">🥈 シルバー</h5>
                    <h2 class="mb-4">¥550<span class="fs-6 text-muted"> /月</span></h2>
                    <ul class="list-unstyled mb-4 text-start">
                        <li><i class="bi bi-check2 text-success me-2"></i>応募制限：10件</li>
                        <li><i class="bi bi-check2 text-success me-2"></i>シルバーバッジ</li>
                    </ul>
                    <a href="{% url 'create_checkout_session' 'silver' %}" class="btn btn-outline-dark w-100 rounded-pill">シルバーを選択</a>
                </div>
            </div>
        </div>

        <div class="col">
            <div class="card h-100 shadow border-0" style="border: 2px solid #ffc107 !important;">
                <div class="card-body text-center p-4">
                    <span class="badge bg-warning text-dark mb-2">推奨</span>
                    <h5 class="fw-bold mb-3">🥇 ゴールド</h5>
                    <h2 class="mb-4">¥2,200<span class="fs-6 text-muted"> /月</span></h2>
                    <ul class="list-unstyled mb-4 text-start">
                        <li><i class="bi bi-check2 text-success me-2"></i>応募制限：無制限</li>
                        <li><i class="bi bi-check2 text-success me-2"></i>ゴールドバッジ</li>
                    </ul>
                    <a href="{% url 'create_checkout_session' 'gold' %}" class="btn btn-warning w-100 rounded-pill fw-bold">ゴールドを選択</a>
                </div>
            </div>
        </div>

        <div class="col">
            <div class="card h-100 shadow-sm border-0" style="background-color: #15151a; color: white;">
                <div class="card-body text-center p-4">
                    <h5 class="fw-bold mb-3">💎 プラチナ</h5>
                    <h2 class="mb-4">¥5,500<span class="fs-6 text-muted"> /月</span></h2>
                    <ul class="list-unstyled mb-4 text-start">
                        <li><i class="bi bi-check2 text-info me-2"></i>すべての機能を解放</li>
                        <li><i class="bi bi-check2 text-info me-2"></i>最優先表示</li>
                    </ul>
                    <a href="{% url 'create_checkout_session' 'platinum' %}" class="btn btn-light w-100 rounded-pill fw-bold">プラチナを選択</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
