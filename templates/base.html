<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>建設マッチング エルクリスト</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <style>
        :root { --sumi-color: #15151a; }
        body { font-family: "Helvetica Neue", Arial, sans-serif; background-color: #f4f5f7; color: var(--sumi-color); }
        .bg-sumi { background-color: var(--sumi-color) !important; }
        .btn-sumi { background-color: var(--sumi-color); color: white; border-radius: 50px; }
        
        /* ロゴ：エルクリストを2回り小さく */
        .brand-title { font-weight: bold; font-size: 1.25rem; } /* h4相当 */
        .brand-sub { font-size: 0.9rem; opacity: 0.8; font-family: serif; } /* h6相当 */

        /* ランクバッジ：白飛び防止 (!important) */
        .badge-PLATINA, .badge-platinum { background: linear-gradient(45deg, #2c3e50, #00d2ff) !important; color: white !important; }
        .badge-GOLD, .badge-gold { background: linear-gradient(45deg, #f1c40f, #f39c12) !important; color: white !important; }
        .badge-SILVER, .badge-silver { background: linear-gradient(45deg, #bdc3c7, #95a5a6) !important; color: white !important; }
        .badge-bronze { background-color: #cd7f32 !important; color: white !important; }
        .badge-iron { background-color: #6c757d !important; color: white !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-sumi sticky-top shadow">
        <div class="container">
            <a class="navbar-brand d-flex align-items-end" href="{% url 'home' %}">
                <span class="brand-title">建設マッチング</span>
                <span class="brand-sub ms-2 mb-1">エルクリスト</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">案件を探す</a></li>
                    {% if user.is_authenticated %}
                        <li class="nav-item"><a class="nav-link" href="{% url 'create_job' %}">募集する</a></li>
                        <li class="nav-item ms-2">
                            <a class="nav-link btn btn-outline-light btn-sm px-3 rounded-pill" href="{% url 'profile_detail' user.id %}">マイページ</a>
                        </li>
                        <li class="nav-item ms-2">
                            <form action="{% url 'logout' %}" method="post" class="d-inline">{% csrf_token %}<button type="submit" class="btn btn-link nav-link">ログアウト</button></form>
                        </li>
                    {% else %}
                        <li class="nav-item ms-2"><a class="nav-link" href="{% url 'login' %}">ログイン</a></li>
                        <li class="nav-item ms-2"><a class="btn btn-warning text-dark fw-bold rounded-pill px-4" href="{% url 'signup' %}">新規登録</a></li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <div class="main-content min-vh-100">
        {% block content %}{% endblock %}
    </div>

    <footer class="bg-sumi text-white py-5 mt-5">
        <div class="container text-center">
            <div class="footer-links mb-3">
                <a href="#" class="text-white-50 text-decoration-none mx-2 small">運営者情報</a>
                <a href="#" class="text-white-50 text-decoration-none mx-2 small">プライバシーポリシー</a>
                <a href="#" class="text-white-50 text-decoration-none mx-2 small">利用規約</a>
                <a href="#" class="text-white-50 text-decoration-none mx-2 small">特定商取引法</a>
            </div>
            <p class="mb-0 small text-white-50">&copy; 2026 Elcrist All Rights Reserved.</p>
        </div>
    </footer>
</body>
</html>
