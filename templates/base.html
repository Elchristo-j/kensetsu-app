<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>建設マッチング エルクリスト</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <style>
        :root { --sumi-color: #15151a; }
        body {
            font-family: "Hiragino Sans", "Meiryo", sans-serif; 
            background-color: #f4f5f7; 
            color: var(--sumi-color); 
        }
        .bg-sumi { background-color: var(--sumi-color) !important; }
        .navbar-brand { line-height: 1.1; display: flex; flex-direction: column; }
        .brand-title { font-weight: bold; font-size: 1.1rem; }
        .brand-sub { font-size: 0.65rem; opacity: 0.7; font-weight: normal; margin-top: 1px; }
        .navbar-dark .navbar-nav .nav-link { color: #ffffff !important; font-weight: 600; }
    </style>
</head>
<body>
    
    <nav class="navbar navbar-expand-lg navbar-dark bg-sumi sticky-top shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <span>
                    <div class="brand-title">建設マッチング</div>
                    <div class="brand-sub">〜 エルクリスト 〜</div>
                </span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-lg-center">
                    {% if user.is_authenticated %}
                        <li class="nav-item">
                            <a class="nav-link" href="/jobs/"><i class="bi bi-search"></i> 案件を探す</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/mypage/"><i class="bi bi-person-circle"></i> マイページ</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/guide/"><i class="bi bi-book"></i> ガイド</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/accounts/logout/">ログアウト</a>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <a class="nav-link" href="/jobs/"><i class="bi bi-search"></i> 案件を探す</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/guide/"><i class="bi bi-book"></i> ガイド</a>
                        </li>
                        <li class="nav-item ms-lg-2">
                            <a class="nav-link" href="/accounts/login/">ログイン</a>
                        </li>
                        <li class="nav-item ms-lg-2 mt-2 mt-lg-0">
                            <a class="btn btn-warning text-dark fw-bold rounded-pill px-4 w-100" href="/accounts/signup/">新規登録</a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container my-4">
        {% block content %}{% endblock %}
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
