{% extends 'base.html' %}

{% block content %}
<div class="container mt-4 mb-5" style="max-width: 600px;">
    <div class="mb-3">
        <a href="{% url 'mypage' %}" class="text-decoration-none text-muted">
            <i class="bi bi-arrow-left"></i> マイページへ戻る
        </a>
    </div>

    <div class="card border-0 shadow-sm rounded-4 p-4 bg-dark text-white">
        <div class="text-center mb-4">
            <h2 class="fw-bold mb-2">📅 スケジュール設定</h2>
            <p class="text-light opacity-75 small">
                今日から30日先までの空き状況を設定できます。<br>
                スカウトを受けたい日を「◎」にしておきましょう！
            </p>
        </div>

        <form method="POST">
            {% csrf_token %}
            
            <div class="list-group list-group-flush mb-4 rounded-3 overflow-hidden">
                {% for item in calendar_data %}
                <div class="list-group-item bg-secondary text-white d-flex justify-content-between align-items-center border-bottom border-dark py-3">
                    <div class="fw-bold fs-5">
                        {{ item.date|date:"n/j" }} 
                        <span class="fs-6 opacity-75">({{ item.date|date:"D" }})</span>
                    </div>
                    
                    <div style="width: 150px;">
                        <select name="status_{{ item.date_str }}" class="form-select fw-bold 
                            {% if item.status == 'available' %}bg-success text-white border-success
                            {% elif item.status == 'negotiable' %}bg-warning text-dark border-warning
                            {% else %}bg-dark text-muted border-secondary{% endif %}">
                            <option value="available" {% if item.status == 'available' %}selected{% endif %}>◎ 空き</option>
                            <option value="negotiable" {% if item.status == 'negotiable' %}selected{% endif %}>△ 要相談</option>
                            <option value="unavailable" {% if item.status == 'unavailable' %}selected{% endif %}>× 不可</option>
                        </select>
                    </div>
                </div>
                {% endfor %}
            </div>

            <div class="position-sticky bottom-0 py-3 bg-dark text-center" style="z-index: 10;">
                <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold shadow-sm w-100">
                    一括で保存する
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
