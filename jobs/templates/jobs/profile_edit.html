{% extends 'base.html' %}
{% load static %}

{% block content %}
<div style="background: red; color: white; padding: 10px; text-align: center; font-weight: bold;">
    【警告】この赤いバーが見えていれば、正しいファイルを編集しています
</div>

<div class="container mt-5" style="max-width: 600px;">
  <div class="card shadow border-0 mb-5">
    <div class="card-header text-white py-3" style="background-color: #15151a !important;">
      <h4 class="mb-0 fw-bold text-white">👤 プロフィールを編集</h4>
    </div>
    <div class="card-body p-4">
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="d-grid gap-2 mt-5">
          <button type="submit" class="btn btn-lg fw-bold text-white" style="background-color: #15151a !important; border: none; border-radius: 50px;">
            変更を保存する
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<style>
  .navbar, .navbar-custom, .btn-primary, .bg-primary {
    background-color: #15151a !important;
    border-color: #15151a !important;
  }
</style>
{% endblock %}
