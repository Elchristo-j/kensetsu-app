{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container mt-5" style="max-width: 600px;">
  
  <div class="card shadow border-0">
    <div class="card-header text-white py-3" style="background-color: #15151a;">
      <h4 class="mb-0 fw-bold">🔨 新しい仕事を募集する</h4>
    </div>
    
    <div class="card-body p-4">
      
      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div class="mb-4">
          <label class="form-label fw-bold">{{ form.title.label }}</label>
          {{ form.title }}
        </div>

        <div class="mb-4">
          <label class="form-label fw-bold">{{ form.description.label }}</label>
          {{ form.description }}
        </div>

        <div class="row mb-4">
          <div class="col-8">
            <label class="form-label fw-bold">{{ form.price.label }}</label>
            <div class="input-group">
              <span class="input-group-text">¥</span>
              {{ form.price }}
            </div>
          </div>
          <div class="col-4">
            <label class="form-label fw-bold">{{ form.unit.label }}</label>
            {{ form.unit }}
          </div>
        </div>

        <div class="row mb-4">
          <div class="col-6">
            <label class="form-label fw-bold">{{ form.headcount.label }}</label>
            <div class="input-group">
              {{ form.headcount }}
              <span class="input-group-text">人</span>
            </div>
          </div>
          <div class="col-6">
            <label class="form-label fw-bold">{{ form.deadline.label }}</label>
            {{ form.deadline }}
          </div>
        </div>

        <div class="d-grid gap-2 mt-5">
          <button type="submit" class="btn btn-lg fw-bold shadow rounded-pill" style="background-color: #15151a !important; color: white !important; border: 1px solid #15151a !important;">
            募集を開始する
          </button>
          
          <a href="{% url 'home' %}" class="btn btn-outline-secondary rounded-pill">
            キャンセルして戻る
          </a>
        </div>
      </form>

    </div>
  </div>

</div>
{% endblock %}
