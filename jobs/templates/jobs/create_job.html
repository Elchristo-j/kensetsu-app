<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>仕事を募集する | 建設マッチング</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
      <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">🏗️ 建設マッチング</a>
      </div>
    </nav>

    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
          
          <div class="card shadow">
            <div class="card-header bg-success text-white py-3">
              <h4 class="mb-0 fw-bold">🔨 新しい仕事を募集する</h4>
            </div>
            <div class="card-body p-4">
              
              <form method="post">
                {% csrf_token %}
                
                <div class="mb-3">
                  <label class="form-label fw-bold">{{ form.title.label }}</label>
                  {{ form.title }}
                </div>
                
                <div class="mb-3">
                  <label class="form-label fw-bold">{{ form.description.label }}</label>
                  {{ form.description }}
                </div>
                
                <div class="mb-4">
                  <label class="form-label fw-bold">{{ form.price.label }}</label>
                  <div class="input-group">
                    <span class="input-group-text">¥</span>
                    {{ form.price }}
                  </div>
                </div>

                <div class="d-grid">
                  <button type="submit" class="btn btn-success btn-lg fw-bold">
                    この内容で募集開始
                  </button>
                </div>
              </form>

            </div>
            <div class="card-footer text-center bg-white py-3">
              <a href="{% url 'home' %}" class="text-decoration-none">キャンセルして戻る</a>
            </div>
          </div>

        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
