{% extends 'base.html' %}
{% block content %}
<div class="container mt-4 mb-5">
    <div class="card shadow border-0 rounded-4 overflow-hidden">
        <div class="card-header bg-sumi text-white py-3 d-flex justify-content-between align-items-center">
            <h5 class="mb-0 fw-bold">💬 チャット: {{ application.job.title }}</h5>
            <a href="{% url 'home' %}" class="btn btn-sm btn-outline-light rounded-pill px-3">戻る</a>
        </div>
        <div class="card-body bg-light" id="chat-box" style="height: 500px; overflow-y: auto; display: flex; flex-direction: column-reverse;">
            <div id="message-container">
                {% for message in messages %}
                    <div class="d-flex mb-3 {% if message.sender == user %}justify-content-end{% else %}justify-content-start{% endif %}">
                        <div class="p-3 shadow-sm {% if message.sender == user %}bg-dark text-white{% else %}bg-white text-dark{% endif %}" style="max-width: 75%; border-radius: 20px;">
                            <p class="mb-1" style="white-space: pre-wrap;">{{ message.content }}</p>
                            <small class="opacity-75 d-block text-end" style="font-size: 0.7rem;">{{ message.created_at|date:"m/d H:i" }}</small>
                        </div>
                    </div>
                {% empty %}
                    <p class="text-center text-muted py-5">まだメッセージはありません。</p>
                {% endfor %}
            </div>
        </div>
        <div class="card-footer bg-white p-3 border-top">
            <form method="post" class="d-flex gap-2">
                {% csrf_token %}
                <textarea name="content" class="form-control rounded-4 shadow-sm" rows="1" placeholder="メッセージを入力..." required style="resize: none;"></textarea>
                <button type="submit" class="btn btn-dark px-4 rounded-pill fw-bold">送信</button>
            </form>
        </div>
    </div>
</div>
<script>
    var chatBox = document.getElementById('chat-box');
    chatBox.scrollTop = chatBox.scrollHeight;
</script>
{% endblock %}
