{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    
    <div class="row justify-content-center mb-5">
        <div class="col-md-8">
            <form class="d-flex shadow-sm" method="get" action="{% url 'home' %}">
                <input class="form-control form-control-lg border-0 rounded-start" type="search" name="query" placeholder="キーワードで探す（例：大阪、塗装、日当）" value="{{ query|default:'' }}" aria-label="Search">
                <button class="btn btn-primary px-4 fw-bold rounded-end" type="submit">検索</button>
            </form>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">募集中のお仕事一覧</h2>
        {% if query %}
            <a href="{% url 'home' %}" class="btn btn-outline-secondary btn-sm">検索条件をクリア</a>
        {% endif %}
    </div>

    <div class="row">
        {% for job in jobs %}
            <div class="col-12 col-md-6 col-lg-4 mb-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title fw-bold">
                            <a href="{% url 'job_detail' job.id %}" class="text-decoration-none text-dark">
                                {{ job.title }}
                            </a>
                        </h5>
                        <p class="card-text text-muted small">
                            {{ job.description|truncatechars:50 }}
                        </p>
                        <p class="card-text fw-bold text-primary">
                            ¥{{ job.price }}
                        </p>
                    </div>
                    <div class="card-footer bg-white border-top-0">
                        <a href="{% url 'job_detail' job.id %}" class="btn btn-primary w-100">詳細を見る</a>
                    </div>
                </div>
            </div>
        {% empty %}
            <div class="col-12 text-center py-5 text-muted">
                <p class="fs-5">条件に合う仕事は見つかりませんでした。</p>
            </div>
        {% endfor %}
    </div>

</div>
{% endblock %}
