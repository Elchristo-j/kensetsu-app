{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-5">
                    <h2 class="fw-bold text-center mb-4">お問い合わせ</h2>
                    <p class="text-muted text-center mb-5">
                        アプリに関するご質問やご要望は、<br>下記フォームよりお気軽にお問い合わせください。
                    </p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-bold">お名前</label>
                            {{ form.name }}
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">メールアドレス</label>
                            {{ form.email }}
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">件名</label>
                            {{ form.subject }}
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">お問い合わせ内容</label>
                            {{ form.message }}
                        </div>
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary rounded-pill py-3 fw-bold">送信する</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
