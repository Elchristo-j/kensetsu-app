<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>建設マッチング（デザイン確認用）</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
      <div class="container">
        <a class="navbar-brand" href="#">🏗️ 建設マッチング</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">
          <div class="navbar-nav ms-auto align-items-center">
            
            <a href="#" class="text-decoration-none d-flex align-items-center me-3">
                  <div class="rounded-circle bg-secondary border border-white" style="width: 40px; height: 40px;"></div>
              </a>
              <span class="text-white me-3 my-2 my-lg-0">ようこそ、テストユーザーさん！</span>
              
              <a href="#" class="btn btn-light text-primary fw-bold btn-sm me-2 my-1 my-lg-0">+ 仕事を募集</a>
              
              <button type="button" class="btn btn-outline-light btn-sm">ログアウト</button>

          </div>
        </div>
      </div>
    </nav>

    <div class="container mt-4">
      
      <div class="row justify-content-center mb-5">
        <div class="col-md-8">
            <form class="d-flex shadow-sm">
                <input class="form-control form-control-lg border-0 rounded-start" type="search" placeholder="キーワードで探す（例：大阪、塗装、日当）" aria-label="Search">
                <button class="btn btn-primary px-4 fw-bold rounded-end" type="button">検索</button>
            </form>
        </div>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">募集中のお仕事一覧</h2>
        <a href="#" class="btn btn-outline-secondary btn-sm">検索条件をクリア</a>
      </div>

      <div class="row">
        <div class="col-12 col-md-6 col-lg-4 mb-4">
            <div class="card h-100 shadow-sm">
              <div class="card-body">
                <h5 class="card-title fw-bold">
                  <a href="#" class="text-decoration-none text-dark">
                    マンション大規模修繕の塗装工募集
                  </a>
                    <span class="badge bg-success ms-2" style="font-size: 0.7em;">募集中</span>
                </h5>
                <p class="card-text text-muted small">
                  大阪市内のマンション改修工事です。経験者優遇、未経験可。道具貸与あり...
                </p>
                <p class="card-text fw-bold text-primary">
                  ¥18,000 / 日
                </p>
              </div>
              <div class="card-footer bg-white border-top-0">
                <a href="#" class="btn btn-primary w-100">詳細を見る</a>
              </div>
            </div>
        </div>

        <div class="col-12 col-md-6 col-lg-4 mb-4">
            <div class="card h-100 shadow-sm">
              <div class="card-body">
                <h5 class="card-title fw-bold">
                  <a href="#" class="text-decoration-none text-dark">
                    電気工事士（第二種以上）急募
                  </a>
                    <span class="badge bg-danger ms-2" style="font-size: 0.7em;">募集終了</span>
                </h5>
                <p class="card-text text-muted small">
                  店舗の配線工事手伝い。即日払い可能です。徳島市内。車通勤OK...
                </p>
                <p class="card-text fw-bold text-primary">
                  ¥22,000 / 日
                </p>
              </div>
              <div class="card-footer bg-white border-top-0">
                <a href="#" class="btn btn-primary w-100">詳細を見る</a>
              </div>
            </div>
        </div>

        <div class="col-12 col-md-6 col-lg-4 mb-4">
            <div class="card h-100 shadow-sm">
              <div class="card-body">
                <h5 class="card-title fw-bold">
                  <a href="#" class="text-decoration-none text-dark">
                    資材搬入の手元作業
                  </a>
                    <span class="badge bg-success ms-2" style="font-size: 0.7em;">募集中</span>
                </h5>
                <p class="card-text text-muted small">
                  半日で終わります。体力に自信のある方。お弁当出ます。...
                </p>
                <p class="card-text fw-bold text-primary">
                  ¥10,000 / 半日
                </p>
              </div>
              <div class="card-footer bg-white border-top-0">
                <a href="#" class="btn btn-primary w-100">詳細を見る</a>
              </div>
            </div>
        </div>

      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
