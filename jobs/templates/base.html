<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>建設マッチング</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
      <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">🏗️ 建設マッチング</a>
    
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
    
        <div class="collapse navbar-collapse" id="navbarContent">
          <div class="navbar-nav ms-auto align-items-center">
            
            {% if user.is_authenticated %}
              <span class="text-white me-3 my-2 my-lg-0">ようこそ、{{ user.username }}さん！</span>
              
              <a href="{% url 'create_job' %}" class="btn btn-light text-primary fw-bold btn-sm me-2 my-1 my-lg-0">+ 仕事を募集</a>
              
              <form action="{% url 'logout' %}" method="post" class="d-inline my-1 my-lg-0">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline-light btn-sm">ログアウト</button>
              </form>
    
            {% else %}
              <a href="{% url 'signup' %}" class="btn btn-light text-primary fw-bold btn-sm me-2 my-1 my-lg-0">会員登録</a>
              <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm my-1 my-lg-0">ログイン</a>
            {% endif %}
            
          </div>
        </div>
      </div>
    </nav>
    <main class="flex-grow-1">
      {% block content %}
      {% endblock %}
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <div class="container">
            <small>&copy; 2025 Construction Matching</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
