{% load static %}
<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>建設マッチング</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
      :root {
        --color-sumi-deep: #15151a; /* 墨色 */
        --color-white: #ffffff;
      }

      /* ヘッダー・フッターの基本色 */
      .navbar-custom, footer {
        background-color: var(--color-sumi-deep) !important;
        color: var(--color-white) !important;
      }

      .navbar-custom .navbar-brand,
      .navbar-custom .nav-link {
        color: var(--color-white) !important;
      }

      /* ボタン：墨色スタイル */
      .btn-monotone {
        background-color: var(--color-sumi-deep) !important;
        color: var(--color-white) !important;
        border: 1px solid var(--color-sumi-deep) !important;
        border-radius: 50px; /* 丸み */
      }
      .btn-monotone:hover {
        background-color: var(--color-white) !important;
        color: var(--color-sumi-deep) !important;
      }

      /* プロフィール画像（丸型） */
      .nav-profile-img {
        width: 32px;
        height: 32px;
        object-fit: cover;
        border-radius: 50%;
        border: 1px solid white;
      }
    </style>
  </head>

  <body class="d-flex flex-column min-vh-100 bg-light">

    <nav class="navbar navbar-expand-lg navbar-custom mb-4">
      <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'home' %}">🏗️ 建設マッチング</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
          <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">
          <div class="navbar-nav ms-auto align-items-center">

            <a class="nav-link me-3" href="{% url 'home' %}">仕事を探す</a>

            {% if user.is_authenticated %}
              <a href="{% url 'create_job' %}" class="btn btn-outline-light btn-sm me-3">+ 仕事を募集</a>

              <div class="nav-item dropdown">
                <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                  {% if user.profile.image %}
                    <img src="{{ user.profile.image.url }}" class="nav-profile-img me-2">
                  {% else %}
                    <span class="me-2">👤</span>
                  {% endif %}
                  {{ user.username }}さん
                </a>
                <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2">
                  <li><a class="dropdown-item" href="{% url 'profile_detail' user.id %}">マイページ</a></li>
                  <li><a class="dropdown-item" href="{% url 'profile_edit' %}">プロフィール編集</a></li>
                  <li><hr class="dropdown-divider"></li>
                  <li>
                    <form action="{% url 'logout' %}" method="post" class="px-3">
                      {% csrf_token %}
                      <button type="submit" class="btn btn-danger btn-sm w-100 text-white">ログアウト</button>
                    </form>
                  </li>
                </ul>
              </div>

            {% else %}
              <a href="{% url 'signup' %}" class="btn btn-monotone btn-sm me-2">会員登録</a>
              <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">ログイン</a>
            {% endif %}

          </div>
        </div>
      </div>
    </nav>

    <main class="flex-grow-1">
      {% block content %}
      {% endblock %}
    </main>

    <footer class="text-white text-center py-3 mt-auto">
      <div class="container">
        <small>&copy; 2025 Construction Matching</small>
      </div>
    </footer>
